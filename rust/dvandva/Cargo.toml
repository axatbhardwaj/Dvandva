[package]
name = "dvandva"
version = "2.0.0-alpha.2"
edition = "2021"
description = "Dvandva: a two-role (vadi/prativadi) multi-agent coordination engine. Multicall binary implementing the read path (state + resolve) over a JSON baton."
license = "MIT OR Apache-2.0"
repository = "https://github.com/axatbhardwaj/Dvandva"
readme = "README.md"
keywords = ["cli", "multi-agent", "coordination", "baton"]
categories = ["command-line-utilities"]

[lib]
name = "dvandva"
path = "src/lib.rs"

[[bin]]
name = "dvandva"
path = "src/main.rs"

[dependencies]
notify = "8.2.0"
regex = "1.12.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.150", features = ["preserve_order", "arbitrary_precision"] }
time = { version = "0.3.53", features = ["formatting"] }

[dev-dependencies]
tempfile = "3.27.0"
